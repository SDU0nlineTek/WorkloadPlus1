{% extends "base.html" %}

{% block title %}数据导出 - 工作量+1{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-6">数据导出</h2>
        
        <form action="/admin/export/download" method="POST" class="space-y-6">
            <!-- 部门选择 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">部门</label>
                <select name="dept_id" onchange="window.location.href='/admin/export?dept_id='+this.value"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    {% for dept in admin_depts %}
                    <option value="{{ dept.id }}" {% if dept.id == current_dept_id %}selected{% endif %}>
                        {{ dept.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- 数据范围选择 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">数据范围</label>
                <div class="space-y-3">
                    <label class="flex items-center">
                        <input type="radio" name="range_type" value="custom" checked
                               onchange="toggleRangeType()" class="mr-2">
                        <span>自定义日期范围</span>
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="range_type" value="period"
                               onchange="toggleRangeType()" class="mr-2">
                        <span>按结算周期</span>
                    </label>
                </div>
            </div>

            <!-- 自定义日期 -->
            <div id="custom-range" class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">开始日期</label>
                    <input type="date" name="start_date"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">结束日期</label>
                    <input type="date" name="end_date"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <!-- 结算周期选择 -->
            <div id="period-select" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">结算周期</label>
                <select name="period_id"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">请选择结算周期</option>
                    {% for period in periods %}
                    <option value="{{ period.id }}">
                        {{ period.title }} ({{ period.start_date.strftime('%Y-%m-%d') }} ~ {{ period.end_date.strftime('%Y-%m-%d') }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <!-- 导出内容说明 -->
            <div class="bg-gray-50 rounded-lg p-4">
                <h4 class="text-sm font-medium text-gray-800 mb-2">导出内容说明</h4>
                <ul class="text-sm text-gray-600 space-y-1">
                    <li>Sheet 1 (个人汇总): 姓名、学号、部门、系统工时、工资/志愿时长、记录摘要</li>
                    <li>Sheet 2 (项目汇总): 项目名称、投入人次、总时长、参与人员</li>
                </ul>
            </div>

            <!-- 下载按钮 -->
            <button type="submit"
                    class="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                          d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                下载 Excel
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    function toggleRangeType() {
        const rangeType = document.querySelector('input[name="range_type"]:checked').value;
        const customRange = document.getElementById('custom-range');
        const periodSelect = document.getElementById('period-select');
        
        if (rangeType === 'custom') {
            customRange.classList.remove('hidden');
            periodSelect.classList.add('hidden');
        } else {
            customRange.classList.add('hidden');
            periodSelect.classList.remove('hidden');
        }
    }
</script>
{% endblock %}
